name: CI/CD Workflow

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:

concurrency:
  # cancel any previous run on this branch or tag that is still in progress
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Rename workflow file reference or update steps
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.22.x', '1.23.x', '1.24.x', '1.25.x', '1.26.x']
        python-version: ['3.12']
        extra: ['mock', 'aer', 'quantify']

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
        cache-dependency-path: 'qpi-interface/go.sum'

    - name: Set up uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      with:
        python-version: ${{ matrix.python-version }}
        enable-cache: true
        cache-dependency-glob: "qpi-driver/pyproject.toml"

    - name: Install dependencies & formatting tools
      run: |
        if [ "${{ matrix.extra }}" = "mock" ]; then
          uv sync --project qpi-driver --extra cli --dev
        elif [ "${{ matrix.extra }}" = "aer" ]; then
          uv sync --project qpi-driver --extra cli --extra aer --dev
        elif [ "${{ matrix.extra }}" = "quantify" ]; then
          uv sync --project qpi-driver --extra cli --extra quantify --dev
        fi
        sudo apt-get update && sudo apt-get install -y zip

    - name: Audit Go Code Formatting
      run: |
        if [ -n "$(gofmt -l qpi-interface)" ]; then
          echo "Go formatting errors found:"
          gofmt -d qpi-interface
          exit 1
        fi

    - name: Vet Go Code
      run: cd qpi-interface && go vet ./...

    - name: Audit Python Code Formatting & Style
      run: |
        uv run --project qpi-driver ruff format --check qpi-driver/
        uv run --project qpi-driver ruff check qpi-driver/

    - name: Run Go Unit Tests
      run: cd qpi-interface && go test -v ./...

    - name: Run Python Unit Tests for '${{ matrix.extra }}'
      run: uv run --project qpi-driver pytest qpi-driver/tests/

    - name: Run E2E Integration Tests for '${{ matrix.extra }}'
      run: ./e2e/run_tests.sh ${{ matrix.extra }}

  publish-pypi:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && vars.PUBLISH_TO_PYPI == 'true'
    permissions:
      id-token: write
      contents: read
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      with:
        python-version: '3.12'

    - name: Build Package
      run: uv build --project qpi-driver/

    - name: Publish package distributions to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: qpi-driver/dist/

  publish-go-release:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && vars.PUBLISH_GO_APP == 'true'
    permissions:
      contents: write
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.x'

    - name: Install zip utility
      run: sudo apt-get update && sudo apt-get install -y zip

    - name: Build Packages
      run: |
        VERSION=${{ github.ref_name }}
        make package VERSION=$${VERSION#v}

    - name: Upload Binaries to Release
      uses: softprops/action-gh-release@v2
      with:
        files: bin/dist/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
