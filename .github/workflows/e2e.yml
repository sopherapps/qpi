name: E2E Integration Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  PUBLISH_TO_PYPI: ${{ vars.PUBLISH_TO_PYPI || 'false' }}

jobs:
  e2e:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.22.x', '1.23.x', '1.24.x', '1.25.x', '1.26.x']
        python-version: ['3.12', '3.13', '3.14']

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
        cache-dependency-path: 'qpi-interface/go.sum'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        cache-dependency-path: 'qpi-driver/pyproject.toml'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ./qpi-driver[cli,aer]

    - name: Run E2E Tests
      run: ./e2e/run_tests.sh

  publish:
    needs: e2e
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && env.PUBLISH_TO_PYPI == 'true'
    permissions:
      id-token: write
      contents: read
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install build dependencies
      run: python -m pip install build

    - name: Build Package
      run: python -m build qpi-driver/

    - name: Publish package distributions to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: qpi-driver/dist/
