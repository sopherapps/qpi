version: '0.2'
config_type: quantify_scheduler.backends.qblox_backend.QbloxHardwareCompilationConfig

hardware_description:
  cluster:
    instrument_type: Cluster
    ref: internal
    modules:
      '2':
        instrument_type: QCM_RF
      '3':
        instrument_type: QRM_RF
      '4':
        instrument_type: QCM

hardware_options:
  modulation_frequencies:
    # Format: "port-clock" using your exact logical port names
    q0:mw-q0.01:
      interm_freq: 200000000.0
    q1:mw-q1.01:
      interm_freq: 250000000.0
    q0:res-q0.ro:
      interm_freq: 50000000.0
    q1:res-q1.ro:
      interm_freq: 60000000.0

connectivity:
  graph:
    - - cluster.module2.complex_output_0
      - q0:mw
    - - cluster.module2.complex_output_1
      - q1:mw
    - - cluster.module3.complex_output_0
      - q0:res
    - - cluster.module3.complex_output_0
      - q1:res
    - - cluster.module4.real_output_0
      - q0:fl
    - - cluster.module4.real_output_1
      - q1:fl